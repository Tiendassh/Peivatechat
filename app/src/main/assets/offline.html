<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CercaMatch - Modo Offline</title>
  <style>
    body {
      background-color: #0F111E;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .container {
      max-width: 450px;
    }
    h1 {
      color: #E91E63;
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.05em;
    }
    p {
      color: #94A3B8;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: heartbeat 1.5s infinite alternate;
    }
    button {
      background-color: #E91E63;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(233, 30, 99, 0.4);
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      background-color: #D81B60;
    }
    button:active {
      transform: scale(0.98);
    }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💔</div>
    <h1>CercaMatch</h1>
    <p>¡Vaya! Parece que estás sin conexión a Internet o el host no está disponible.</p>
    <p>No te preocupes. Nuestra base de datos local Room mantiene tus perfiles, mensajes y debates locales guardados en tu dispositivo para que puedas seguir chateando offline.</p>
    <button onclick="window.location.reload()">Reintentar conexión</button>
  </div>
</body>
</html>
